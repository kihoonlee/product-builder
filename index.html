<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴 문의</title>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <div class="form-wrapper">
      <h1>제휴 문의</h1>
      <p class="subtitle">파트너십 및 제휴에 관심 있으신가요? 아래 양식을 작성해 주시면 빠르게 연락드리겠습니다.</p>

      <form id="affiliate-form" action="https://formspree.io/f/xwvnjlpq" method="POST">
        <div class="form-group">
          <label for="name">이름 <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="홍길동" required />
        </div>

        <div class="form-group">
          <label for="company">회사명 <span class="required">*</span></label>
          <input type="text" id="company" name="company" placeholder="(주)예시회사" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">이메일 <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="example@company.com" required />
          </div>
          <div class="form-group">
            <label for="phone">연락처</label>
            <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" />
          </div>
        </div>

        <div class="form-group">
          <label for="website">웹사이트</label>
          <input type="url" id="website" name="website" placeholder="https://www.example.com" />
        </div>

        <div class="form-group">
          <label for="partnership-type">제휴 유형 <span class="required">*</span></label>
          <select id="partnership-type" name="partnership_type" required>
            <option value="" disabled selected>유형을 선택해 주세요</option>
            <option value="affiliate">어필리에이트 (수익 공유)</option>
            <option value="reseller">리셀러 / 대리점</option>
            <option value="comarketing">공동 마케팅</option>
            <option value="technology">기술 파트너십</option>
            <option value="other">기타</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">문의 내용 <span class="required">*</span></label>
          <textarea id="message" name="message" rows="5" placeholder="제휴 목적, 예상 규모, 기타 문의 사항을 자유롭게 작성해 주세요." required></textarea>
        </div>

        <button type="submit" id="submit-btn">
          <span id="btn-text">문의 보내기</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>
      </form>

      <div id="success-msg" class="success-msg hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <h2>문의가 접수되었습니다!</h2>
        <p>빠른 시일 내에 입력하신 이메일로 연락드리겠습니다.</p>
      </div>
    </div>
  </div>

  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
